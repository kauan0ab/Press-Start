<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/projetoJogos/img/mark event/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="/projetoJogos/css/form.css">
    <title>formulario de cadastro</title>
</head>

<body>
    <header>
        
        
    </header>
    
    <div class="pageContent">
        <section id="inscricoes" class="secaoFormulario">
    <img src="/projetoJogos/img/mark event/logo.png" alt="logotipo do evento" id="logo">
    <h2>Inscreva-se no Campeonato</h2>

    <form class="formulario">
        <label>Nome:</label>
        <input type="text" name="nome" required>

        <label>E-mail:</label>
        <input type="email" name="email" required>

        <label>Escolha o jogo:</label>
        <select name="jogo" required>
            <option value="">Selecione</option>
            <option>Valorant</option>
            <option>League of Legends</option>
            <option>CS2</option>
            <option>FIFA</option>
            <option>Mortal Combat X</option>
            <option>call of duty</option>
        </select>

        <label>Nick</label>
        <input type="text" name="login" required>

        <label>Senha:</label>

        <input type="password" name="senha" required>
        <button type="submit" id="submitButtomStyle">Cadastrar</button>
        <button type="button" id="loginButtomStyle"> login </button>
</section>

    </div>
    <footer>

    </footer>
    <script src="/projetoJogos/javascript/Script.js"></script>
</body>
</html>
